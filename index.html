<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080c18"/>
  <title>Gesture Transfer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">

  <!-- Header -->
  <header>
    <h1>✋ Gesture <span>Transfer</span></h1>
    <div class="status-indicator">
      <span class="dot red" id="status-dot"></span>
      <span id="status-text">Connecting...</span>
    </div>
  </header>

  <div class="grid">

    <!-- ── Camera ── -->
    <div class="card">
      <h2>📷 Hand Camera</h2>

      <div class="camera-box">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="hand-canvas"></canvas>
        <div class="cam-placeholder" id="cam-placeholder">
          <span>🤚</span><p>Camera is off</p>
        </div>
        <div class="gesture-hud">
          <span id="gesture-icon">👋</span>
          <span id="gesture-label" style="color:#666">Show your hand</span>
        </div>
      </div>

      <button id="cam-toggle">📷 Enable Camera</button>

      <div class="gesture-guide">
        <strong>Gestures:</strong><br/>
        ✊ <strong>Fist</strong> — Upload selected image<br/>
        🖐 <strong>Open Palm</strong> — Receive next image
      </div>
    </div>

    <!-- ── Upload ── -->
    <div class="card">
      <h2>⬆️ Send Image</h2>
      <div class="upload-zone" id="upload-zone">
        <div class="icon">🖼️</div>
        <p id="upload-hint">Tap or drag image here</p>
        <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none"/>
      </div>
      <div class="preview-box" id="preview-box">
        <img id="preview-img" src="" alt="Preview"/>
      </div>
    </div>

    <!-- ── Receive ── -->
    <div class="card">
      <h2>📥 Received Image</h2>
      <div class="receive-box" id="receive-box">
        <span class="placeholder-icon">🖐</span>
        <span class="placeholder-text">Open Palm to receive</span>
        <img id="received-img" src="" alt="Received"/>
      </div>
      <p id="received-meta"></p>
    </div>

    <!-- ── Feed ── -->
    <div class="card">
      <h2>📋 Activity Feed</h2>
      <div class="queue-info">
        <span style="font-size:.82rem;color:var(--muted)">Waiting:</span>
        <span class="badge" id="queue-badge" style="display:none">0</span>
        <span style="font-size:.82rem;color:var(--muted)" id="queue-none">None</span>
      </div>
      <div class="feed-list" id="feed-list">
        <div style="color:#445;font-size:.82rem;text-align:center;padding:20px">No activity yet...</div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script src="js/config.js"></script>
<script src="js/three-bg.js"></script>
<script src="js/gesture.js"></script>
<script src="js/database.js"></script>
<script src="js/app.js"></script>

</body>
</html>
